<svg width="300" height="180" xmlns="http://www.w3.org/2000/svg">
  <style>
    .class-box { fill: #ffffff; stroke: #000000; stroke-width: 2; }
    .divider { stroke: #000000; stroke-width: 1; }
    .text { font-family: Arial, sans-serif; font-size: 14px; }
    .title { font-weight: bold; font-size: 16px; }
  </style>

  <!-- Outer class box -->
  <rect x="20" y="20" width="260" height="140" class="class-box"/>

  <!-- Class name -->
  <text x="150" y="45" text-anchor="middle" class="text title">User</text>

  <!-- Divider line -->
  <line x1="20" y1="55" x2="280" y2="55" class="divider"/>

  <!-- Attributes -->
  <text x="30" y="75" class="text"># name : std::string</text>
  <text x="30" y="95" class="text"># id : int</text>

  <!-- Divider line -->
  <line x1="20" y1="105" x2="280" y2="105" class="divider"/>

  <!-- Methods -->
  <text x="30" y="125" class="text">+ User(name : std::string, id : int)</text>
  <text x="30" y="145" class="text">+ printInfo() : void</text>
</svg>